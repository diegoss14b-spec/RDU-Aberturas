name: Mesa de Aberturas (valor)

# 14/07 — densificação close (P1):
#   full  = :00 UTC captura cheia + board + deploy
#   close = jogo em ≤90min e última captura ≥12min (janela 2.5h, sem deploy)
#   skip  = captura <12min
# Extra crons :15/:30/:45 só pra close denso perto do apito.

on:
  schedule:
    - cron: "0 * * * *"           # full candidate
    - cron: "15,30,45 * * * *"    # close densify
  workflow_dispatch: {}           # manual = sempre full

permissions:
  contents: write             # commit dos snapshots/histórico de odds no próprio repo

concurrency:
  group: valor
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    outputs:
      mode: ${{ steps.decide.outputs.mode }}
    steps:
      - name: Decidir modo (sem checkout — barato)
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          # QUAL cron disparou (o GitHub informa a expressão exata). NÃO usar now.minute:
          # o agendador do GitHub atrasa o cron em vários minutos (medido 14/07: dispara
          # :01/:07/:12/:16/:31/:34/:48 — quase nunca :00), então minute==0 nunca casava
          # e o full JAMAIS rodava (25 close × 2 full em 27 rodadas; os 2 full eram manuais).
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'EOF'
          import json, os, base64, urllib.request, datetime as dt
          now = dt.datetime.now(dt.timezone.utc)
          out = open(os.environ['GITHUB_OUTPUT'], 'a')

          def emit(m, why):
              print(f'mode={m} ({why})'); out.write(f'mode={m}\n'); raise SystemExit

          if os.environ.get('EVENT') == 'workflow_dispatch':
              emit('full', 'manual')

          # O cron HORÁRIO ("0 * * * *") = SEMPRE full — é o único momento em que o board é
          # montado e deployado. Identificado pela EXPRESSÃO do cron (github.event.schedule),
          # não pelo relógio: o GitHub atrasa o disparo e minute==0 quase nunca acontece.
          # A densificação close fica só no cron ":15,30,45".
          FULL_CRON = '0 * * * *'
          if os.environ.get('EVENT') == 'schedule' and os.environ.get('SCHEDULE') == FULL_CRON:
              emit('full', f"cron horario ({os.environ.get('SCHEDULE')})")

          def gh(path):
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{os.environ['REPO']}/contents/{path}",
                  headers={'Authorization': 'Bearer ' + os.environ['GH_TOKEN'],
                           'Accept': 'application/vnd.github+json'})
              d = json.load(urllib.request.urlopen(req, timeout=20))
              return base64.b64decode(d['content']).decode('utf-8')

          try:
              # última captura (summary commitado a cada run de captura)
              s = json.loads(gh('data/odds/_status/summary.json'))
              last = dt.datetime.strptime(s['ts_brt'], '%Y-%m-%d %H:%M').replace(
                  tzinfo=dt.timezone(dt.timedelta(hours=-3)))
              age_min = (now - last).total_seconds() / 60
              # mínimo 12 min entre capturas (densifica close sem martelar proxy)
              if age_min < 12:
                  emit('skip', f'captura recente ({age_min:.0f}min)')

              # jogos iminentes (≤90 min) → close prioritário
              soon = 0
              try:
                  t = urllib.request.urlopen(
                      'https://valor-rdu.netlify.app/data/history.js', timeout=20).read().decode()
                  payload = t.split('=', 1)[1].rstrip().rstrip(';')
                  h = json.loads(payload)
                  for r in h.get('abertas') or []:
                      ko = r.get('kickoff')
                      if not ko: continue
                      try: k = dt.datetime.fromisoformat(ko)
                      except Exception: continue
                      if k.tzinfo is None:
                          k = k.replace(tzinfo=dt.timezone(dt.timedelta(hours=-3)))
                      m = (k - now).total_seconds() / 60
                      if 0 <= m <= 90: soon += 1
              except Exception as e:
                  print('close-check falhou (segue full se aplicável):', e)

              # close denso: ≥12 min desde última + jogo em ≤90 min
              if soon and age_min >= 12:
                  emit('close', f'{soon} jogos em ≤90min (ultima captura ha {age_min:.0f}min)')

              # Só chega aqui, vindo de cron, o de densificação (:15/:30/:45) — o horário já
              # saiu como full lá em cima. Sem jogo iminente, ele não tem o que fazer.
              if os.environ.get('EVENT') == 'schedule':
                  emit('skip', f"cron densificacao sem jogo iminente (ultima ha {age_min:.0f}min)")

              if soon:
                  emit('close', f'{soon} jogos em ≤90min')
              emit('skip', 'sem jogo iminente')
          except SystemExit:
              raise
          except Exception as e:
              print('gate erro → skip:', e)
              out.write('mode=skip\n')
          EOF

  atualizar:
    needs: gate
    if: needs.gate.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MODE: ${{ needs.gate.outputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache do navegador (Playwright)
        if: env.MODE == 'full'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Playwright só no full (7k pega JWTs via HTTP puro; browser é só fallback raro)
      - name: Instalar Playwright (fallback do 7k)
        if: env.MODE == 'full'
        run: python -m playwright install --with-deps chromium

      # Orquestrador: 4 casas em PARALELO com timeout próprio, grava _status/summary.json.
      # Betano/7k/EstrelaBet geo-bloqueiam ou rate-limitam IP estrangeiro → proxy BR (secrets).
      # No modo close, ODDS_WINDOW_H filtra pra só os jogos iminentes (captura ~2-4min).
      - name: Capturar odds (orquestrado, sem falha silenciosa)
        id: capture
        continue-on-error: true
        env:
          DECODO_USER: ${{ secrets.DECODO_USER }}
          DECODO_PASS: ${{ secrets.DECODO_PASS }}
          ODDS_WINDOW_H: ${{ env.MODE == 'close' && '2.5' || '' }}
        run: python run_capture.py

      # Histórico de odds SEMPRE (mesmo com captura parcial — o que entrou vira tick)
      - name: Banco de odds (ticks + open/close + CLV)
        if: always()
        continue-on-error: true
        run: |
          python history_ingest.py
          python history_close.py
          python history_settle.py
          python build_history.py
          python build_moves.py

      # Board + deploy SÓ no full (close é captura de fechamento pro banco; o board
      # filtrado da janela curta NÃO deve substituir o board cheio do site)
      - name: Montar o board
        if: env.MODE == 'full' && steps.capture.outcome == 'success'
        run: python build_board.py

      # Painel de Operação (sempre que houver status/histórico — útil mesmo em close)
      - name: Painel de operação
        if: always()
        continue-on-error: true
        run: python build_ops.py

      - name: Gate de qualidade
        id: gate
        if: env.MODE == 'full' && steps.capture.outcome == 'success'
        continue-on-error: true
        run: python gate_board.py

      - name: Publicar no Netlify
        if: env.MODE == 'full' && steps.capture.outcome == 'success' && steps.gate.outcome == 'success'
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: python deploy.py

      # Persistência: snapshots leves + histórico no próprio repo (dataset nosso, versionado)
      - name: Commit snapshots + histórico
        if: always()
        run: |
          git config user.name "valor-bot"
          git config user.email "actions@github.com"
          git add -A data/odds/_status data/odds/*_latest.json data/odds/*_latest_full.json data/odds/*_latest_close.json data/odds_history valor/data/history.js valor/data/moves.js valor/data/ops.js || true
          git diff --cached --quiet || git commit -m "odds: snapshot $(date -u +%Y%m%d_%H%M) [$MODE] [skip ci]"
          git pull --rebase origin main || true
          git push || echo "push falhou (sem mudanças ou conflito)"

      # Job falha se a captura FULL foi insuficiente (visibilidade no Actions)
      - name: Veredito
        if: env.MODE == 'full' && steps.capture.outcome != 'success'
        run: |
          echo "::error::Captura insuficiente — deploy bloqueado, site antigo permanece no ar (ver data/odds/_status/summary.json)"
          exit 1
