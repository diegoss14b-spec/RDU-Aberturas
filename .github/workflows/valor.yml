name: Mesa de Aberturas (valor)

# Rodada full em :07 UTC: captura completa, board, gate e deploy.
# Rodadas :22/:37/:52: somente fechamento quando houver jogo iminente.
# O watchdog independente em :17/:47 recupera um full perdido quando o board passa de 90 min.
on:
  schedule:
    - cron: "7 * * * *"           # full candidate
    - cron: "22,37,52 * * * *"    # close densify
  workflow_dispatch: {}           # manual = sempre full

permissions:
  contents: write             # commit dos snapshots/histórico de odds no próprio repo

concurrency:
  group: valor
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    outputs:
      mode: ${{ steps.decide.outputs.mode }}
    steps:
      - name: Decidir modo (sem checkout — barato)
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          # QUAL cron disparou (o GitHub informa a expressão exata). NÃO usar now.minute:
          # o agendador do GitHub atrasa o cron em vários minutos (medido 14/07: dispara
          # :01/:07/:12/:16/:31/:34/:48 — quase nunca :00), então minute==0 nunca casava
          # e o full JAMAIS rodava (25 close × 2 full em 27 rodadas; os 2 full eram manuais).
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'EOF'
          import json, os, base64, urllib.request, datetime as dt
          now = dt.datetime.now(dt.timezone.utc)
          out = open(os.environ['GITHUB_OUTPUT'], 'a')

          def emit(m, why):
              print(f'mode={m} ({why})'); out.write(f'mode={m}\n'); raise SystemExit

          if os.environ.get('EVENT') == 'workflow_dispatch':
              emit('full', 'manual')

          # O cron HORÁRIO ("7 * * * *") = SEMPRE full — é o único momento em que o board é
          # montado e deployado. Identificado pela EXPRESSÃO do cron (github.event.schedule),
          # não pelo relógio: o GitHub atrasa o disparo e minute==0 quase nunca acontece.
          # A densificação close fica só no cron ":22/:37/:52".
          FULL_CRON = '7 * * * *'
          if os.environ.get('EVENT') == 'schedule' and os.environ.get('SCHEDULE') == FULL_CRON:
              emit('full', f"cron horario ({os.environ.get('SCHEDULE')})")

          # AUTOCURA contra cron engolido: o agendador do GitHub descarta boa parte dos
          # disparos (medido 15/07: 4 crons/h configurados → ~0,6 rodada/h chegando; as
          # rodadas de 03:00 e 04:00 UTC simplesmente não vieram). Reconhecer o cron certo
          # não adianta se ele nunca chega. Então QUALQUER rodada agendada que encontre o
          # board vencido faz o full que o horário deveria ter feito. Usa a idade do board
          # AO VIVO (o que o usuário vê) — é exatamente o invariante que interessa.
          BOARD_MAX_MIN = 75
          try:
              tb = urllib.request.urlopen(
                  'https://valor-rdu.netlify.app/data/board.js', timeout=20).read().decode()
              board = json.loads(tb.split('=', 1)[1].rstrip().rstrip(';'))
              stamp = board.get('gerado_iso') or board.get('gerado')
              if not stamp:
                  raise ValueError('board sem timestamp')
              if 'T' in stamp:
                  parsed = dt.datetime.fromisoformat(stamp.replace('Z', '+00:00'))
                  if parsed.tzinfo is None:
                      parsed = parsed.replace(tzinfo=dt.timezone(dt.timedelta(hours=-3)))
              else:
                  parsed = dt.datetime.strptime(stamp, '%Y-%m-%d %H:%M').replace(
                      tzinfo=dt.timezone(dt.timedelta(hours=-3)))
              bage = (now - parsed).total_seconds() / 60
              print(f'board ao vivo: {stamp} ({bage:.0f}min)')
              if bage > BOARD_MAX_MIN:
                  # emit() levanta SystemExit — não é pego pelo except Exception abaixo
                  emit('full', f'board vencido ({bage:.0f}min) — recupera cron perdido')
          except Exception as e:
              print('board-age check falhou (segue):', e)

          def gh(path):
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{os.environ['REPO']}/contents/{path}",
                  headers={'Authorization': 'Bearer ' + os.environ['GH_TOKEN'],
                           'Accept': 'application/vnd.github+json'})
              d = json.load(urllib.request.urlopen(req, timeout=20))
              return base64.b64decode(d['content']).decode('utf-8')

          try:
              # última captura (summary commitado a cada run de captura)
              s = json.loads(gh('data/odds/_status/summary.json'))
              last = dt.datetime.strptime(s['ts_brt'], '%Y-%m-%d %H:%M').replace(
                  tzinfo=dt.timezone(dt.timedelta(hours=-3)))
              age_min = (now - last).total_seconds() / 60
              # mínimo 12 min entre capturas (densifica close sem martelar proxy)
              if age_min < 12:
                  emit('skip', f'captura recente ({age_min:.0f}min)')

              # jogos iminentes (≤90 min) → close prioritário
              soon = 0
              try:
                  t = urllib.request.urlopen(
                      'https://valor-rdu.netlify.app/data/history.js', timeout=20).read().decode()
                  payload = t.split('=', 1)[1].rstrip().rstrip(';')
                  h = json.loads(payload)
                  for r in h.get('abertas') or []:
                      ko = r.get('kickoff')
                      if not ko: continue
                      try: k = dt.datetime.fromisoformat(ko)
                      except Exception: continue
                      if k.tzinfo is None:
                          k = k.replace(tzinfo=dt.timezone(dt.timedelta(hours=-3)))
                      m = (k - now).total_seconds() / 60
                      if 0 <= m <= 90: soon += 1
              except Exception as e:
                  print('close-check falhou (segue full se aplicável):', e)

              # close denso: ≥12 min desde última + jogo em ≤90 min
              if soon and age_min >= 12:
                  emit('close', f'{soon} jogos em ≤90min (ultima captura ha {age_min:.0f}min)')

              # Só chega aqui, vindo de cron, o de densificação (:22/:37/:52) — o horário já
              # saiu como full lá em cima. Sem jogo iminente, ele não tem o que fazer.
              if os.environ.get('EVENT') == 'schedule':
                  emit('skip', f"cron densificação sem jogo iminente (ultima ha {age_min:.0f}min)")

              if soon:
                  emit('close', f'{soon} jogos em ≤90min')
              emit('skip', 'sem jogo iminente')
          except SystemExit:
              raise
          except Exception as e:
              print('gate erro → skip:', e)
              out.write('mode=skip\n')
          EOF

  atualizar:
    needs: gate
    if: needs.gate.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MODE: ${{ needs.gate.outputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache do navegador (Playwright)
        if: env.MODE == 'full'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Playwright só no full (7k pega JWTs via HTTP puro; browser é só fallback raro)
      - name: Instalar Playwright (fallback do 7k)
        if: env.MODE == 'full'
        run: python -m playwright install --with-deps chromium

      # Orquestrador: 5 casas em PARALELO com timeout próprio, grava _status/summary.json.
      # Betano/7k/EstrelaBet geo-bloqueiam ou rate-limitam IP estrangeiro → proxy BR (secrets).
      # No modo close, ODDS_WINDOW_H filtra pra só os jogos iminentes (captura ~2-4min).
      - name: Capturar odds (orquestrado, sem falha silenciosa)
        id: capture
        continue-on-error: true
        env:
          DECODO_USER: ${{ secrets.DECODO_USER }}
          DECODO_PASS: ${{ secrets.DECODO_PASS }}
          ODDS_WINDOW_H: ${{ env.MODE == 'close' && '2.5' || '' }}
        run: python run_capture.py

      # Histórico de odds SEMPRE (mesmo com captura parcial — o que entrou vira tick)
      - name: Banco de odds (ticks + open/close + CLV)
        id: history
        if: always()
        continue-on-error: true
        run: |
          python migrate_history_keys.py
          python history_ingest.py
          python history_close.py
          python history_settle.py
          python build_history.py
          python build_moves.py

      # Board + deploy SÓ no full (close é captura de fechamento pro banco; o board
      # filtrado da janela curta NÃO deve substituir o board cheio do site)
      - name: Montar o board
        id: board
        if: env.MODE == 'full' && steps.capture.outcome == 'success'
        run: python build_board.py

      # Painel de Operação (sempre que houver status/histórico — útil mesmo em close)
      - name: Painel de operação
        id: ops
        if: always()
        continue-on-error: true
        run: python build_ops.py

      - name: Gate de qualidade
        id: gate
        if: env.MODE == 'full' && steps.capture.outcome == 'success'
        continue-on-error: true
        run: python gate_board.py


      # Persistência versionada: status, snapshots estáveis, fixtures e histórico.
      - name: Commit snapshots + histórico
        id: persist
        if: always()
        env:
          GATE_OUTCOME: ${{ steps.gate.outcome }}
        run: |
          git config user.name "valor-bot"
          git config user.email "actions@github.com"

          git add -A -- data/odds/_status data/odds_history \
            valor/data/history.js valor/data/moves.js valor/data/ops.js
          if [ "$MODE" = "full" ] && [ "$GATE_OUTCOME" = "success" ]; then
            git add -A -- valor/data/board.js
            for p in data/odds/*_latest_full.json data/odds/_snapshots \
                     data/fixtures/sofa_latest.json data/fixtures/sofa_latest_data.json \
                     data/fixtures/_snapshots; do
              [ -e "$p" ] && git add -A -- "$p"
            done
          else
            echo "Board/snapshots não aprovados pelo gate: persistindo só diagnóstico/histórico."
          fi

          # Não faça rebase depois do gate: isso trocaria a árvore já testada por uma
          # combinação que nunca foi reconstruída/validada (TOCTOU). Se main avançou,
          # esta rodada falha fechada e a próxima reconstrói tudo sobre a base nova.
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::main avançou durante a rodada; artefatos não serão publicados."
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "Sem artefatos novos para commitar."
            exit 0
          fi

          git commit -m "odds: snapshot $(date -u +%Y%m%d_%H%M) [$MODE] [skip ci]"
          if ! git push origin HEAD:main; then
            echo "::error::Push rejeitado; deploy bloqueado para evitar publicar estado não persistido."
            exit 1
          fi

      # Só publica o estado que já foi versionado e enviado com sucesso ao repositório.
      - name: Publicar no Netlify
        id: deploy
        if: >-
          env.MODE == 'full' &&
          steps.capture.outcome == 'success' &&
          steps.history.outcome == 'success' &&
          steps.board.outcome == 'success' &&
          steps.ops.outcome == 'success' &&
          steps.gate.outcome == 'success' &&
          steps.persist.outcome == 'success'
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: python deploy.py

      # Torna falhas de etapas best-effort visíveis sem impedir a persistência diagnóstica.
      - name: Veredito
        if: always()
        env:
          CAPTURE_OUTCOME: ${{ steps.capture.outcome }}
          PERSIST_OUTCOME: ${{ steps.persist.outcome }}
          HISTORY_OUTCOME: ${{ steps.history.outcome }}
          BOARD_OUTCOME: ${{ steps.board.outcome }}
          OPS_OUTCOME: ${{ steps.ops.outcome }}
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          fail=0
          if [ "$PERSIST_OUTCOME" != "success" ]; then
            echo "::error::Persistência Git falhou; deploy bloqueado."
            fail=1
          fi
          if [ "$HISTORY_OUTCOME" != "success" ]; then
            echo "::error::Pipeline de histórico/liquidação falhou."
            fail=1
          fi
          if [ "$OPS_OUTCOME" != "success" ]; then
            echo "::error::Painel operacional não foi atualizado."
            fail=1
          fi
          if [ "$MODE" = "full" ]; then
            if [ "$CAPTURE_OUTCOME" != "success" ]; then
              echo "::error::Captura insuficiente; deploy bloqueado e site anterior preservado."
              fail=1
            elif [ "$BOARD_OUTCOME" != "success" ]; then
              echo "::error::Montagem do board falhou."
              fail=1
            elif [ "$GATE_OUTCOME" != "success" ]; then
              echo "::error::Gate de qualidade bloqueou o deploy."
              fail=1
            elif [ "$DEPLOY_OUTCOME" != "success" ]; then
              echo "::error::Netlify não confirmou a publicação."
              fail=1
            fi
          fi
          exit "$fail"
