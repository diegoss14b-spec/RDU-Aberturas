name: Mesa de Aberturas (valor)

on:
  schedule:
    - cron: "0 */4 * * *"   # a cada 4h (UTC) — captura + board + deploy
  workflow_dispatch: {}      # botão de rodar manual

concurrency:
  group: valor
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache do navegador (Playwright)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Capturar odds (4 casas)
        run: |
          python fetch_odds_betano.py || true
          python fetch_odds_superbet.py || true
          python fetch_odds_7k.py || true
          python fetch_odds_estrelabet.py || true

      - name: Montar o board
        run: python build_board.py

      - name: Publicar no Netlify
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: python deploy.py
