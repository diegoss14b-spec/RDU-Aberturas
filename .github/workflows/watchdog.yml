name: Mesa de Aberturas (watchdog)

# Redundância independente: se o agendador principal perder rodadas e o board ao vivo
# ultrapassar 90 minutos, dispara uma rodada full. Os minutos evitam o pico de :00.
on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

concurrency:
  group: valor-watchdog
  cancel-in-progress: true

jobs:
  recuperar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verificar frescor e recuperar cron perdido
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ github.event.repository.default_branch }}
        run: |
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.request

          MAX_AGE_MIN = 90
          BRT = dt.timezone(dt.timedelta(hours=-3))
          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          ref = os.environ.get("REF") or "main"

          def github(method, path, body=None):
              data = json.dumps(body).encode() if body is not None else None
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}{path}",
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(request, timeout=25) as response:
                  payload = response.read()
              return json.loads(payload) if payload else {}

          def board_age_minutes():
              with urllib.request.urlopen(
                  "https://valor-rdu.netlify.app/data/board.js", timeout=25
              ) as response:
                  raw = response.read().decode("utf-8")
              board = json.loads(raw.split("=", 1)[1].strip().rstrip(";"))
              stamp = board.get("gerado_iso") or board.get("gerado")
              if not stamp:
                  raise ValueError("board sem timestamp")
              if "T" in stamp:
                  parsed = dt.datetime.fromisoformat(stamp.replace("Z", "+00:00"))
                  if parsed.tzinfo is None:
                      parsed = parsed.replace(tzinfo=BRT)
              else:
                  parsed = dt.datetime.strptime(stamp, "%Y-%m-%d %H:%M").replace(
                      tzinfo=BRT
                  )
              return (dt.datetime.now(dt.timezone.utc) - parsed).total_seconds() / 60

          reason = ""
          try:
              age = board_age_minutes()
              print(f"board ao vivo: {age:.0f} min")
              if -10 <= age <= MAX_AGE_MIN:
                  print("board fresco; nenhuma recuperação necessária")
                  raise SystemExit(0)
              reason = f"idade inválida/vencida ({age:.0f} min)"
          except SystemExit:
              raise
          except Exception as exc:
              reason = f"leitura do board falhou: {type(exc).__name__}: {exc}"

          for status in ("in_progress", "queued"):
              runs = github(
                  "GET",
                  f"/actions/workflows/valor.yml/runs?status={status}&per_page=1",
              )
              if runs.get("total_count", 0):
                  print(f"{reason}; fluxo principal já está {status}")
                  raise SystemExit(0)

          print(f"{reason}; disparando rodada full em {ref}")
          github(
              "POST",
              "/actions/workflows/valor.yml/dispatches",
              {"ref": ref},
          )
          print("workflow_dispatch enviado")
          PY
